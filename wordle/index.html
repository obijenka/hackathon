<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Вордли</title>
    <link rel="stylesheet" href="../styles.css?v=2" />
    <link rel="stylesheet" href="./style.css?v=2" />
  </head>
  <body>
    <div class="app" id="app">
      <header class="topbar">
        <a class="btn btn--pill topbar__menu" href="../home/index.html">В меню</a>
        <h1 class="title">Вордли</h1>
        <div class="topbar__spacer" aria-hidden="true"></div>
      </header>

      <main class="stage" aria-label="Игра Вордли">
        <section class="w">
          <div class="w__hud" aria-label="Счёт">
            <div class="w__score" aria-label="Очки">
              <span id="score">0</span>
            </div>
            <div class="w__coinsLine" id="coinsLine" aria-label="МТкоины">
              <span class="w__coinsText">+0</span>
              <img class="w__coin" src="../images/coin.png" alt="" />
              <span class="w__maxBadge" id="maxBadge" aria-hidden="true">MAX</span>
            </div>
          </div>

          <div class="w__grid" id="grid" aria-label="Поле"></div>

          <div class="w__status" id="status" aria-live="polite"></div>

          <button class="btn btn--pill w__restart" id="restartBtn" type="button">Ещё раз</button>

          <button class="w__kbdToggle" id="kbdToggle" type="button" aria-controls="kbd" aria-expanded="false">
            ⌨
          </button>

          <div class="w__kbdBackdrop" id="kbdBackdrop" aria-hidden="true"></div>
          <div class="w__kbd" id="kbd" aria-label="Клавиатура"></div>
        </section>
      </main>

      <nav class="bottombar" aria-label="Навигация">
        <a class="tab" href="../home/index.html">
          <span class="tab__icon"><img src="../images/menu/main.png" alt="" /></span>
          <span class="tab__text">Главная</span>
        </a>
        <button class="tab" type="button">
          <span class="tab__icon"><img src="../images/menu/products.png" alt="" /></span>
          <span class="tab__text">Продукты</span>
        </button>
        <button class="tab tab--active" type="button">
          <span class="tab__icon"><img src="../images/menu/games.png" alt="" /></span>
          <span class="tab__text">Игры</span>
        </button>
        <button class="tab" type="button">
          <span class="tab__icon"><img src="../images/menu/more.png" alt="" /></span>
          <span class="tab__text">Ещё</span>
        </button>
      </nav>
    </div>

    <script src="./script.js?v=2" defer></script>
  </body>
</html>
